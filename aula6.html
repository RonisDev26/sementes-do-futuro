<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pokédex</title>
    <link rel="stylesheet" href="./pokedéx.css">
</head>
<body>
    <nav class="menu">
        <h2>Pokédex</h2>
        <ul>
            <li>Início</li>
            <li>Regiões</li>
            <li>Batalha</li>
        </ul>

        
    </nav>

    <header class="capa">
        <h1>Escolha seu Pokémon Inicial</h1>
    </header>

    <main class="galeria_pokemon">
        <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="Bulbasaur" width="150px" class="efeito">
            <h3>Bulbasaur</h3>
            <div class="tipo">
                <p id="planta_bul">Planta</p>
                <p id="veneno_bul">Veneno</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>

        

         <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" alt="Charmander" width="150px" class="efeito">
            <h3>Charmander</h3>
            <div class="tipo">
                <p id="fogo_char">Fogo</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>

         <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" alt="Squirtle" width="150px" class="efeito">
            <h3>Squirtle</h3>
            <div class="tipo">
                <p id="azul_squi">Água</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>

        <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu" width="150px" class="efeito">
            <h3>Pikachu</h3>
            <div class="tipo">
                <p id="amarelo_pika">Elétrico</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>

        <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/13.png" alt="weedle" width="150px" class="efeito">
            <h3>Weedle</h3>
            <div class="tipo">
                <p id="inseto_we">Inseto</p>
                <p id="veneno_we">Veneno</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>

        <div class="cartao tremor">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/23.png" alt="ekans" width="150px" class="efeito">
            <h3>Ekans</h3>
            <div class="tipo">
                <p id="veneno_eka">Veneno</p>
            </div>
            
            <button class="btn_treinar"> Treinar</button>
        </div>
        <br>

        <div class="spinner"></div>
    </main>
</body>
</html>
